<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/src/shared/assets/wlogo.png?v=20260411">
    <link rel="shortcut icon" href="/favicon.ico?v=20260411">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semi-Overt</title>
    <script>
      (function () {
        try {
          var raw = window.localStorage.getItem('now.darkMode')
          var isDark = raw ? JSON.parse(raw) === true : false
          document.documentElement.classList.toggle('dark', isDark)
        } catch (error) {
          document.documentElement.classList.remove('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
